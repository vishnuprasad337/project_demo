<!DOCTYPE html>
<html>
<head>
    <title>Hotel Rooms</title>
    <style>
        table {
            width: 60%;
            margin: 30px auto;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }
        th {
            background-color: #1e3c72;
            color: white;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">
    🏨 Rooms - {{ hotel.name }}
</h2>

<table>
    <tr>
        <th>Room Type</th>
        <th>Price</th>
        <th>Available Rooms</th>
    </tr>

    {% for room in rooms %}
    <tr>
        <td>{{ room.room_type }}</td>
        <td>{{ room.price }}</td>
        <td>{{ room.available_rooms }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No Rooms Available</td>
    </tr>
    {% endfor %}
</table>

<div style="text-align:center;">
    <a href="{% url 'hotel_list' %}">⬅ Back to Hotels</a>
</div>

</body>
</html>
