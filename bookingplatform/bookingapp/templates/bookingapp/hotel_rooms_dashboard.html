<h2 style="text-align:center;">🏨 Rooms - {{ hotel.name }}</h2>

<table>
    <tr>
        <th>Room Type</th>
        <th>Price</th>
        <th>Available</th>
        <th>Action</th>
    </tr>

    {% for room in rooms %}
    <tr>
        <td>{{ room.room_type }}</td>
        <td>{{ room.price }}</td>
        <td>{{ room.available_rooms }}</td>
        <td>
            <form action="{% url 'hotel_rooms' hotel.id %}" method="POST" style="display:inline;">
                {% csrf_token %}
                <input type="hidden" name="room_type" value="{{ room.room_type }}">
                <input type="number" name="count" value="1" style="width: 40px;">
                <button type="submit" style="background: #28a745; color: white; border: none; padding: 5px; cursor: pointer;">
                    ➕ Add
                </button>
            </form>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No Rooms Available</td>
    </tr>
    {% endfor %}
</table>

<div style="text-align:center; margin-top: 20px;">
    <a href="{% url 'hotel_dashboard' %}">⬅ Back to Dashboard</a>
</div>
