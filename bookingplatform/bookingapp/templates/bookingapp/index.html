<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Platform</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #e6eaef);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 15px 0;
        }

        a {
            display: block;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            background: #f0f4ff;
            color: #1e3c72;
            transition: 0.3s ease;
        }

        a:hover {
            background: #1e3c72;
            color: white;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏨 Booking Platform</h1>
        <ul>
            <li><a href="{% url 'user' %}">👤 Manage Users</a></li>
           <a href="{% url 'hotel' %}">Manage Hotel</a></li>
           
            <li><a href="{}">📅 Manage Bookings</a></li>
        </ul>
        <div class="footer">
            © 2026 Booking System | Developed by You 🚀
        </div>
    </div>
</body>
</html>
