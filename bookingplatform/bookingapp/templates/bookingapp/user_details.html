<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #f0f2f5; }
        .profile-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; margin: auto; }
        h2 { border-bottom: 2px solid #0072ff; padding-bottom: 10px; }
        .detail { margin: 15px 0; font-size: 18px; }
        label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2>Welcome, {{ user.name }}! 👋</h2>
        
        <div class="detail"><label>Email:</label> {{ user.email }}</div>
        <div class="detail"><label>Address:</label> {{ user.Address }}</div>
        <div class="detail"><label>Phone:</label> {{ user.phonenumber }}</div>
        <div class="detail"><label>Member Since:</label> {{ user.created_at|date:"M d, Y" }}</div>
        
        <a href="/login/" style="color: red; text-decoration: none;">Logout</a>
    </div>

</body>
</html>
